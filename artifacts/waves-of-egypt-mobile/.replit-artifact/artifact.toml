kind = "mobile"
previewPath = "/mobile/"
title = "WavesOfEgypt Mobile"
version = "1.0.0"
id = "artifacts/waves-of-egypt-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 21459

[services.development]
run = "pnpm --filter @workspace/waves-of-egypt-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/waves-of-egypt-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/waves-of-egypt-mobile", "run", "serve" ]

[services.env]
PORT = "21459"
BASE_PATH = "/mobile/"
