openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WavesOfEgypt travel marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: destinations
    description: Destination management
  - name: tours
    description: Tour and experience management
  - name: categories
    description: Category management
  - name: bookings
    description: Booking management
  - name: reviews
    description: Review management
  - name: wishlist
    description: Wishlist management
  - name: auth
    description: Authentication
  - name: stats
    description: Platform statistics
  - name: vendors
    description: Vendor management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── DESTINATIONS ──────────────────────────────────────────────────────────
  /destinations:
    get:
      operationId: listDestinations
      tags: [destinations]
      summary: List all destinations
      parameters:
        - name: featured
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"

    post:
      operationId: createDestination
      tags: [destinations]
      summary: Create a destination (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DestinationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"

  /destinations/{id}:
    get:
      operationId: getDestination
      tags: [destinations]
      summary: Get destination by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Destination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── CATEGORIES ───────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ── TOURS ────────────────────────────────────────────────────────────────
  /tours:
    get:
      operationId: listTours
      tags: [tours]
      summary: List tours with optional filters
      parameters:
        - name: destinationId
          in: query
          schema:
            type: integer
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, rating, newest, best_seller, duration_asc, duration_desc]
        - name: isPrivate
          in: query
          schema:
            type: boolean
        - name: isFamilyFriendly
          in: query
          schema:
            type: boolean
        - name: hasHotelPickup
          in: query
          schema:
            type: boolean
        - name: freeCancellation
          in: query
          schema:
            type: boolean
        - name: instantConfirmation
          in: query
          schema:
            type: boolean
        - name: minDuration
          in: query
          schema:
            type: number
        - name: maxDuration
          in: query
          schema:
            type: number
        - name: minRating
          in: query
          schema:
            type: number
        - name: isBestSeller
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list of tours
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourList"

    post:
      operationId: createTour
      tags: [tours]
      summary: Create a tour (vendor/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"

  /tours/{id}:
    get:
      operationId: getTour
      tags: [tours]
      summary: Get tour by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tour details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    patch:
      operationId: updateTour
      tags: [tours]
      summary: Update a tour (vendor/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourUpdate"
      responses:
        "200":
          description: Updated tour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"

    delete:
      operationId: deleteTour
      tags: [tours]
      summary: Delete a tour (vendor/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /tours/featured:
    get:
      operationId: getFeaturedTours
      tags: [tours]
      summary: Get featured tours for homepage
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Featured tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"

  /tours/best-sellers:
    get:
      operationId: getBestSellerTours
      tags: [tours]
      summary: Get best-selling tours
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Best sellers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"

  /tours/special-offers:
    get:
      operationId: getSpecialOffers
      tags: [tours]
      summary: Get tours with special offers
      responses:
        "200":
          description: Special offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"

  /tours/{id}/availability:
    get:
      operationId: getTourAvailability
      tags: [tours]
      summary: Get tour availability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Availability slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"

  # ── REVIEWS ──────────────────────────────────────────────────────────────
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews for a tour
      parameters:
        - name: tourId
          in: query
          schema:
            type: integer
        - name: rating
          in: query
          schema:
            type: number
            description: Filter by minimum rating
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # ── BOOKINGS ─────────────────────────────────────────────────────────────
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List user bookings (or all if admin/vendor)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled, completed]
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
          description: Filter bookings on or after this tour date (YYYY-MM-DD)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
          description: Filter bookings on or before this tour date (YYYY-MM-DD)
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # ── WISHLIST ──────────────────────────────────────────────────────────────
  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      summary: Get current user's wishlist
      responses:
        "200":
          description: Wishlist tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"

    post:
      operationId: addToWishlist
      tags: [wishlist]
      summary: Add a tour to wishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishlistInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /wishlist/{tourId}:
    delete:
      operationId: removeFromWishlist
      tags: [wishlist]
      summary: Remove tour from wishlist
      parameters:
        - name: tourId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── STATS ─────────────────────────────────────────────────────────────────
  /stats:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Get platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  # ── VENDOR ───────────────────────────────────────────────────────────────
  /vendors/dashboard:
    get:
      operationId: getVendorDashboard
      tags: [vendors]
      summary: Get vendor dashboard stats
      responses:
        "200":
          description: Vendor stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorDashboard"

  /vendors/tours:
    get:
      operationId: listVendorTours
      tags: [vendors]
      summary: List tours owned by current vendor
      responses:
        "200":
          description: Vendor tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"

  # ── ADMIN ────────────────────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [vendors]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/users:
    get:
      operationId: listUsers
      tags: [vendors]
      summary: List all users (admin)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [customer, vendor, admin]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # ── AUTH ────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 6
        name:
          type: string
        role:
          type: string
          enum: [customer, vendor]

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          description: Bearer token to include in subsequent API requests

    User:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [customer, vendor, admin]
        avatar:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # ── DESTINATION ─────────────────────────────────────────────────────────
    Destination:
      type: object
      required: [id, name, slug, region, imageUrl, tourCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        region:
          type: string
          enum: [red_sea, nile_valley, mediterranean, western_desert, sinai]
        imageUrl:
          type: string
        tourCount:
          type: integer
        featured:
          type: boolean

    DestinationInput:
      type: object
      required: [name, slug, region, imageUrl]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        region:
          type: string
          enum: [red_sea, nile_valley, mediterranean, western_desert, sinai]
        imageUrl:
          type: string
        featured:
          type: boolean

    # ── CATEGORY ─────────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, slug, icon, tourCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        tourCount:
          type: integer
        color:
          type: ["string", "null"]

    # ── TOUR ─────────────────────────────────────────────────────────────────
    Tour:
      type: object
      required: [id, title, slug, price, durationHours, destinationId, categoryId, rating, reviewCount, coverImage, isAvailable]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        discountPrice:
          type: ["number", "null"]
        durationHours:
          type: number
        destinationId:
          type: integer
        destinationName:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        vendorId:
          type: ["integer", "null"]
        vendorName:
          type: ["string", "null"]
        rating:
          type: number
        reviewCount:
          type: integer
        coverImage:
          type: string
        images:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        excluded:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        maxParticipants:
          type: ["integer", "null"]
        minAge:
          type: ["integer", "null"]
        difficulty:
          type: ["string", "null"]
          enum: [easy, moderate, challenging, null]
        isFeatured:
          type: boolean
        isAvailable:
          type: boolean
        isPrivate:
          type: boolean
        isFamilyFriendly:
          type: boolean
        hasHotelPickup:
          type: boolean
        freeCancellation:
          type: boolean
        instantConfirmation:
          type: boolean
        groupType:
          type: string
          enum: [private, group]
        badge:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    TourDetail:
      allOf:
        - $ref: "#/components/schemas/Tour"
        - type: object
          properties:
            itinerary:
              type: array
              items:
                $ref: "#/components/schemas/ItineraryStep"
            meetingPoint:
              type: ["string", "null"]
            languages:
              type: array
              items:
                type: string
            reviews:
              type: array
              items:
                $ref: "#/components/schemas/Review"
            faq:
              type: array
              items:
                type: object
                properties:
                  question:
                    type: string
                  answer:
                    type: string
            whatsappNumber:
              type: ["string", "null"]
            videoUrl:
              type: ["string", "null"]

    TourList:
      type: object
      required: [tours, total, limit, offset]
      properties:
        tours:
          type: array
          items:
            $ref: "#/components/schemas/Tour"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    TourInput:
      type: object
      required: [title, slug, price, durationHours, destinationId, categoryId, coverImage]
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
        discountPrice:
          type: ["number", "null"]
        durationHours:
          type: number
        destinationId:
          type: integer
        categoryId:
          type: integer
        coverImage:
          type: string
        images:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        excluded:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        maxParticipants:
          type: ["integer", "null"]
        minAge:
          type: ["integer", "null"]
        difficulty:
          type: string
          enum: [easy, moderate, challenging]
        meetingPoint:
          type: ["string", "null"]
        languages:
          type: array
          items:
            type: string
        isFeatured:
          type: boolean

    TourUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        discountPrice:
          type: ["number", "null"]
        durationHours:
          type: number
        coverImage:
          type: string
        images:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        excluded:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        maxParticipants:
          type: ["integer", "null"]
        isFeatured:
          type: boolean
        isAvailable:
          type: boolean

    ItineraryStep:
      type: object
      required: [order, title]
      properties:
        order:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        durationMinutes:
          type: ["integer", "null"]

    AvailabilitySlot:
      type: object
      required: [date, available, spotsLeft]
      properties:
        date:
          type: string
          format: date
        available:
          type: boolean
        spotsLeft:
          type: integer
        price:
          type: ["number", "null"]

    # ── REVIEW ───────────────────────────────────────────────────────────────
    Review:
      type: object
      required: [id, tourId, rating, createdAt]
      properties:
        id:
          type: integer
        tourId:
          type: integer
        userId:
          type: ["integer", "null"]
        name:
          type: ["string", "null"]
          description: Reviewer display name
        country:
          type: ["string", "null"]
          description: Reviewer country
        tourTitle:
          type: ["string", "null"]
        userName:
          type: ["string", "null"]
        userAvatar:
          type: ["string", "null"]
        rating:
          type: number
        comment:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ReviewInput:
      type: object
      required: [tourId, rating, name]
      properties:
        tourId:
          type: integer
        name:
          type: string
          description: Reviewer display name
        country:
          type: string
          description: Reviewer country (optional)
        rating:
          type: number
          minimum: 1
          maximum: 5
        comment:
          type: string

    # ── BOOKING ──────────────────────────────────────────────────────────────
    Booking:
      type: object
      required: [id, tourId, userId, date, participants, totalPrice, status, createdAt]
      properties:
        id:
          type: integer
        tourId:
          type: integer
        tourTitle:
          type: ["string", "null"]
        tourCoverImage:
          type: ["string", "null"]
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        date:
          type: string
          format: date
        participants:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    BookingInput:
      type: object
      required: [tourId, date, participants]
      properties:
        tourId:
          type: integer
        date:
          type: string
          format: date
        participants:
          type: integer
          minimum: 1
        notes:
          type: string

    BookingUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        notes:
          type: string

    # ── WISHLIST ─────────────────────────────────────────────────────────────
    WishlistInput:
      type: object
      required: [tourId]
      properties:
        tourId:
          type: integer

    # ── STATS ─────────────────────────────────────────────────────────────────
    PlatformStats:
      type: object
      required: [totalTours, totalDestinations, totalBookings, happyTravelers, averageRating]
      properties:
        totalTours:
          type: integer
        totalDestinations:
          type: integer
        totalBookings:
          type: integer
        happyTravelers:
          type: integer
        averageRating:
          type: number
        topDestinations:
          type: array
          items:
            $ref: "#/components/schemas/Destination"
        popularCategories:
          type: array
          items:
            $ref: "#/components/schemas/Category"

    VendorDashboard:
      type: object
      required: [totalTours, totalBookings, totalRevenue, pendingBookings, averageRating]
      properties:
        totalTours:
          type: integer
        totalBookings:
          type: integer
        totalRevenue:
          type: number
        pendingBookings:
          type: integer
        averageRating:
          type: number
        recentBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    AdminDashboard:
      type: object
      required: [totalUsers, totalVendors, totalTours, totalBookings, totalRevenue]
      properties:
        totalUsers:
          type: integer
        totalVendors:
          type: integer
        totalTours:
          type: integer
        totalBookings:
          type: integer
        totalRevenue:
          type: number
        newUsersThisMonth:
          type: integer
        bookingsThisMonth:
          type: integer
        revenueThisMonth:
          type: number
        recentBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
        topTours:
          type: array
          items:
            $ref: "#/components/schemas/Tour"
